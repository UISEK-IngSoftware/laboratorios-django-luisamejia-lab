{% extends 'base.html' %}
{% block title %}Formulario de Pokemon{% endblock title %}   
{% block content %}
<form action="{% url 'pokedex:add_pokemon' %}" method="post" enctype="multipart/form-data">
    {% csrf_token %}     
   {{ form.as_div }}
    <button type="submit" class="btn btn-primary">Agregar Pokemon</button>
    <a href="{% url 'pokedex:index' %}" class="btn btn-secondary">Atras</a>
    </form>
{% endblock content %}
