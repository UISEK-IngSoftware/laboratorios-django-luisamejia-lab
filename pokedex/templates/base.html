<!DOCTYPE html>
{% load static %} 
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>{% block title %}Pokedex{% endblock %}</title>
        
        <!-- Bootstrap y estilos personalizados -->
        <link href="{% static 'bootstrap.min.css' %}" rel="stylesheet" />
        <link href="{% static 'custom.css' %}" rel="stylesheet" />
        
        <!-- CDN de FontAwesome para que funcionen tus iconos -->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    </head>
    <body class="bg-light">
        
        <!-- Contenedor principal con sombra y fondo blanco para destacar el contenido -->
        <div class="container bg-white shadow min-vh-100 p-0">
            
            <!-- Encabezado con el Logo -->
            <div class="bg-primary p-4 text-center">
                <img src="{% static 'logo_pokedex.png' %}" alt="Pokedex" class="logo img-fluid" style="max-height: 100px;">
            </div>
            
            <!-- Barra de Navegación -->
            <nav class="navbar navbar-expand-lg navbar-dark bg-primary border-top border-secondary">
                <div class="container-fluid px-4">
                    <a class="navbar-brand fw-bold" href="{% url 'pokedex:index' %}"></a>
                    
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                    
                    <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
                        <div class="navbar-nav me-auto">
                            <a class="nav-link" href="{% url 'pokedex:index' %}">Inicio</a>
                        </div>
                        <!-- ms-auto empuja el inicio/cierre de sesión hacia la derecha -->
                        <div class="navbar-nav ms-auto">
                            {% if not user.is_authenticated %}
                                <a class="nav-link" href="{% url 'pokedex:login' %}">
                                    <i class="fas fa-sign-in-alt me-1"></i> Iniciar Sesión
                                </a>   
                            {% else %}
                                <a class="nav-link" href="{% url 'logout' %}">
                                    <i class="fas fa-sign-out-alt me-1"></i> Cerrar Sesión
                                </a>
                            {% endif %}
                        </div>
                    </div>
                </div>
            </nav>
            
            <!-- Bloque de Contenido con espaciado interno -->
            <div class="p-4">
                {% block content %}
                {% endblock content %}
            </div>
            
        </div>

        <!-- Bootstrap JavaScript al final del cuerpo para mejorar la velocidad de carga -->
        <script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
    </body>
</html>
